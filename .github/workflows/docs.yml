name: Docs

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install insurance-distributional-glm and pdoc
        run: |
          pip install -e ".[plots]" pdoc

      - name: Generate API docs
        run: |
          pdoc \
            --output-directory docs/api \
            --docformat google \
            --footer-text "insurance-distributional-glm v$(python -c 'import insurance_distributional_glm; print(insurance_distributional_glm.__version__)')" \
            --edit-url "insurance_distributional_glm=https://github.com/burning-cost/insurance-distributional-glm/blob/main/src/insurance_distributional_glm/" \
            insurance_distributional_glm \
            insurance_distributional_glm.families

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "docs: regenerate API reference [skip ci]"
          git pull --rebase
          git push
